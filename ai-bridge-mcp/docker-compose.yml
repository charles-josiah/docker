services:
  ai-bridge-mcp:
    build: .
    container_name: ai-bridge-mcp
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MCP_BEARER_TOKEN=${MCP_BEARER_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    env_file:
      - .env
    volumes:
      - agy_config:/root/.gemini

volumes:
  agy_config:
